{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- profile social links: brand-colored banner buttons -->
<style>
  .author__urls li { border-radius: 6px; margin-bottom: 7px; transition: filter 0.15s ease; }
  .author__urls li:hover { filter: brightness(0.97); }
  .author__urls li a { display: block; padding: 7px 12px; font-weight: 600; color: #2b2b2b !important; }
  .author__urls li a:hover { text-decoration: none; color: #2b2b2b !important; }
  .lnk-github  { background: #e3e6ea; } .lnk-github  i { color: #24292e !important; }
  .lnk-scholar { background: #d6e4fc; } .lnk-scholar i { color: #2f6fdb !important; }
  .lnk-orcid   { background: #e4efc6; } .lnk-orcid   i { color: #6f9e1f !important; }
  .lnk-email   { background: #fbd5d0; } .lnk-email   i { color: #d8392b !important; }
</style>

<!-- end custom head snippets -->
